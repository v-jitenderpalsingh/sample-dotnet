name: Test CSC problem matcher

on: [push, workflow_dispatch]

jobs:
  test-matcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Scaffold TWO broken projects (no .sln needed)
        run: |
          mkdir -p broken && cd broken

          # --- Project 1 ---
          dotnet new classlib -n Broken --force
          cat > Broken/Class1.cs <<'EOF'
          namespace Broken;
          public class Class1
          {
              public int Value { get; set }   // missing ';' -> CS1002
          }
          EOF

          # --- Project 2 (independent, lets MSBuild build them in parallel) ---
          dotnet new classlib -n AlsoBroken --force
          cat > AlsoBroken/Class1.cs <<'EOF'
          namespace AlsoBroken;
          public class Class1
          {
              public int Other { get; set }   // missing ';' -> CS1002
          }
          EOF

          # --- File used only by Scenario C (dotnet format) ---
          cat > Broken/Formatting.cs <<'EOF'
          namespace Broken;
          public class Formatting
          {
              public int X = 1;   
                public int Y = 2;
          }
          EOF

          ls -la Broken AlsoBroken

      # --- Scenario A: plain `dotnet build` on a single project -> CS#### ---
      - name: 'Scenario A — dotnet build (expect CSxxxx)'
        working-directory: broken
        continue-on-error: true
        run: dotnet build Broken/Broken.csproj -nologo

      # --- Scenario B: `dotnet msbuild` on TWO projects in parallel -> "N>" prefix ---
      # The 'N>' prefix appears when MSBuild builds >=2 projects concurrently.
      - name: 'Scenario B — dotnet msbuild -m on two .csproj files (expect ''N>'' prefixed CSxxxx)'
        working-directory: broken
        continue-on-error: true
        run: |
          dotnet msbuild \
            Broken/Broken.csproj \
            AlsoBroken/AlsoBroken.csproj \
            -m:4 -nologo -clp:ShowProjectFile

      # --- Scenario B (fallback): synthesize the exact line shape the new regex must catch.
      # This guarantees an 'N>'-prefixed line in the log even if MSBuild's console output
      # on this runner doesn't include the prefix.
      - name: 'Scenario B-fallback — emit a synthetic ''N>''-prefixed line'
        working-directory: broken
        continue-on-error: true
        run: |
          PROJ_ABS="$(pwd)/Broken/Broken.csproj"
          FILE_ABS="$(pwd)/Broken/Class1.cs"
          echo "    2>${FILE_ABS}(4,35): error CS1002: ; expected [${PROJ_ABS}]"
          exit 1   # non-zero so the matcher scans the failed step's output

      # --- Scenario C: `dotnet format` -> non-numeric code (WHITESPACE) ---
      - name: 'Scenario C — dotnet format (expect WHITESPACE)'
        working-directory: broken
        continue-on-error: true
        run: dotnet format Broken/Broken.csproj --verify-no-changes --severity info